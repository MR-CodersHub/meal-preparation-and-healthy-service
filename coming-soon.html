<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Coming Soon | FuelUp App</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .coming-soon-wrapper {
            position: relative;
            z-index: 2;
            width: 100%;
            padding: 40px 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .countdown-container {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 20px;
            margin: 40px 0;
            width: 100%;
            max-width: 800px;
        }
        .count-box {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(10px);
            padding: 25px 15px;
            border-radius: var(--radius-md);
            border: 1px solid var(--border-color);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }
        .count-box h2 { font-size: 3.5rem; color: var(--primary); margin: 0; line-height: 1; }
        .count-box span { color: var(--text-muted); text-transform: uppercase; font-size: 0.85rem; font-weight: 700; margin-top: 10px; letter-spacing: 1px; }
        
        /* Form & Button adjustments */
        .notify-form {
            display: flex;
            gap: 15px;
            max-width: 600px;
            margin: 0 auto;
            width: 100%;
            flex-wrap: wrap;
        }
        .notify-input {
            flex: 1;
            min-width: 250px;
            background: rgba(0, 0, 0, 0.5);
            border: 1px solid var(--border-color);
            padding: 15px 20px;
            border-radius: 12px;
            color: #fff;
            font-size: 16px; /* Prevents iOS auto-zoom */
            outline: none;
        }
        .notify-input:focus {
            border-color: var(--primary);
        }
        /* Override global button scale transform to prevent viewport glitches */
        .btn {
            transform: none !important;
        }
        .btn:active {
            transform: none !important;
        }
        .action-btns {
            display: flex;
            gap: 15px;
            flex: 1;
            min-width: 250px;
        }
        .action-btns .btn {
            flex: 1;
            padding: 15px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* Mobile Responsive */
        @media (max-width: 768px) {
            .countdown-container {
                grid-template-columns: repeat(2, 1fr);
                gap: 15px;
            }
            .count-box {
                padding: 20px 10px;
            }
            .count-box h2 { font-size: 2.5rem; }
            h1 { font-size: 2.5rem !important; }
        }
        @media (max-width: 480px) {
            .action-btns {
                flex-direction: column;
            }
        }
    </style>
    <link rel="icon" type="image/png" href="assets/images/favicon.png">
</head>
<body style="min-height: 100vh; display: flex; align-items: center; justify-content: center; text-align: center; background: url('https://images.unsplash.com/photo-1490645935967-10de6ba17061?auto=format&fit=crop&w=1920&q=80') center/cover no-repeat; overflow-x: hidden;">
    <!-- Use fixed instead of absolute so the background persists if the page scrolls -->
    <div style="position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); z-index: 1;"></div>
    
    <div class="coming-soon-wrapper">
        <a href="index.html" class="logo" style="font-size: 2.5rem; margin-bottom: 30px; display: inline-block;"><img src="assets/images/logo.png" alt="FuelUp Logo" class="logo-img">FUEL<span>UP</span></a>
        <h1 style="font-size: 3.5rem; margin-bottom: 20px;">The Future of <span class="text-gradient">Nutrition App</span></h1>
        <p style="color: var(--text-muted); max-width: 600px; margin: 0 auto; font-size: 1.1rem; line-height: 1.6;">We're cooking up something special. Our mobile app is launching soon to help you track macros and manage deliveries on the go.</p>
        
        <div class="countdown-container">
            <div class="count-box">
                <h2 id="days">14</h2>
                <span>Days</span>
            </div>
            <div class="count-box">
                <h2 id="hours">08</h2>
                <span>Hours</span>
            </div>
            <div class="count-box">
                <h2 id="minutes">45</h2>
                <span>Mins</span>
            </div>
            <div class="count-box">
                <h2 id="seconds">12</h2>
                <span>Secs</span>
            </div>
        </div>

        <div style="width: 100%; max-width: 600px;">
            <p style="margin-bottom: 20px; color: var(--text-muted); font-weight: 600;">Notify me when it launches:</p>
            <div class="notify-form">
                <input type="email" class="notify-input" placeholder="Email Address">
                <div class="action-btns">
                    <button class="btn btn-primary">Join Waitlist</button>
                    <button class="btn btn-outline"><i class="fas fa-download" style="margin-right: 8px;"></i>Download App</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        // Simple countdown logic
        let d = 14, h = 8, m = 45, s = 12;
        setInterval(() => {
            s--;
            if(s < 0) { s = 59; m--; }
            if(m < 0) { m = 59; h--; }
            if(h < 0) { h = 23; d--; }
            document.getElementById('days').innerText = d.toString().padStart(2, '0');
            document.getElementById('hours').innerText = h.toString().padStart(2, '0');
            document.getElementById('minutes').innerText = m.toString().padStart(2, '0');
            document.getElementById('seconds').innerText = s.toString().padStart(2, '0');
        }, 1000);
    </script>
</body>
</html>
