<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Coming Soon | FuelUp App</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .countdown-container {
            display: flex;
            justify-content: center;
            gap: 30px;
            margin: 50px 0;
        }
        .count-box {
            background: var(--bg-card);
            padding: 30px;
            border-radius: var(--radius-md);
            border: 1px solid var(--border-color);
            min-width: 120px;
        }
        .count-box h2 { font-size: 3rem; color: var(--primary); }
        .count-box span { color: var(--text-muted); text-transform: uppercase; font-size: 0.8rem; font-weight: 700; }
    </style>
    <link rel="icon" type="image/png" href="assets/images/favicon.png">
</head>
<body style="height: 100vh; display: flex; align-items: center; justify-content: center; text-align: center; background: url('https://images.unsplash.com/photo-1490645935967-10de6ba17061?auto=format&fit=crop&w=1920&q=80') center/cover no-repeat;">
    <div style="position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); z-index: 1;"></div>
    
    <div class="container" style="position: relative; z-index: 2;">
        <a href="index.html" class="logo" style="font-size: 3rem; margin-bottom: 20px; display: inline-block;"><img src="assets/images/logo.png" alt="FuelUp Logo" class="logo-img">FUEL<span>UP</span></a>
        <h1 style="font-size: 3.5rem; margin-bottom: 20px;">The Future of <span class="text-gradient">Nutrition App</span></h1>
        <p style="color: var(--text-muted); max-width: 600px; margin: 0 auto;">We're cooking up something special. Our mobile app is launching soon to help you track macros and manage deliveries on the go.</p>
        
        <div class="countdown-container">
            <div class="count-box">
                <h2 id="days">14</h2>
                <span>Days</span>
            </div>
            <div class="count-box">
                <h2 id="hours">08</h2>
                <span>Hours</span>
            </div>
            <div class="count-box">
                <h2 id="minutes">45</h2>
                <span>Mins</span>
            </div>
            <div class="count-box">
                <h2 id="seconds">12</h2>
                <span>Secs</span>
            </div>
        </div>

        <div style="max-width: 500px; margin: 0 auto;">
            <p style="margin-bottom: 20px;">Notify me when it launches:</p>
            <div style="display: flex; gap: 10px;">
                <input type="email" placeholder="Email Address" style="flex: 1; background: var(--bg-card); border: 1px solid var(--border-color); padding: 15px; border-radius: 12px; color: #fff;">
                <button class="btn btn-primary">Join Waitlist</button>
            </div>
        </div>
    </div>

    <script>
        // Simple countdown logic
        let d = 14, h = 8, m = 45, s = 12;
        setInterval(() => {
            s--;
            if(s < 0) { s = 59; m--; }
            if(m < 0) { m = 59; h--; }
            if(h < 0) { h = 23; d--; }
            document.getElementById('days').innerText = d.toString().padStart(2, '0');
            document.getElementById('hours').innerText = h.toString().padStart(2, '0');
            document.getElementById('minutes').innerText = m.toString().padStart(2, '0');
            document.getElementById('seconds').innerText = s.toString().padStart(2, '0');
        }, 1000);
    </script>
</body>
</html>
