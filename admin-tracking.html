<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Global Delivery Tracking | Admin Dashboard</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="sidebar-overlay"></div>
    <div class="dashboard-wrapper">
        <div class="sidebar">
            <a href="index.html" class="logo">FUEL<span>UP</span></a>
            <nav class="sidebar-nav" style="height: calc(100% - 100px); display: flex; flex-direction: column;">
                <div style="flex: 1;">
                    <a href="admin.html" class="nav-item"><i class="fas fa-th-large"></i> Overview</a>
                    <a href="admin-revenue.html" class="nav-item"><i class="fas fa-chart-line"></i> Revenue Analytics</a>
                    <a href="admin-users.html" class="nav-item"><i class="fas fa-users"></i> User Management</a>
                    <a href="admin-content.html" class="nav-item"><i class="fas fa-file-alt"></i> Content Management</a>
                    <a href="admin-orders.html" class="nav-item"><i class="fas fa-shopping-basket"></i> Orders Management</a>
                    <a href="admin-tracking.html" class="nav-item active"><i class="fas fa-truck"></i> Delivery Tracking</a>
                    <a href="admin-notifications.html" class="nav-item"><i class="fas fa-bell"></i> Notifications</a>
                    <a href="admin-settings.html" class="nav-item"><i class="fas fa-cog"></i> Settings</a>
                </div>
                <a href="index.html" class="nav-item" style="margin-top: auto; color: #ff4d4d;"><i class="fas fa-sign-out-alt"></i> Back to Site</a>
            </nav>
        </div>

        <div class="main-content">
            <div class="mobile-dash-header" style="display: flex; align-items: center; gap: 15px; margin-bottom: 20px;">
                    <button class="dash-toggle" aria-label="Toggle Sidebar" style="background: none; border: none; outline: none;">
                        <i class="fas fa-bars"></i>
                    </button>
                    <h1 style="font-size: clamp(1.2rem, 5vw, 2.5rem); margin: 0;">Global <span class="text-gradient">Delivery Tracking</span></h1>
                </div>
            <div class="dash-card" style="margin-top: 40px;">
                <div class="glass" style="height: 500px; border-radius: var(--radius-lg); background: url('https://images.unsplash.com/photo-1526778548025-fa2f459cd5c1?auto=format&fit=crop&w=1200&q=80'); background-size: cover; background-position: center; position: relative;">
                    <!-- Mock Rider Dots -->
                    <div style="position: absolute; top: 30%; left: 40%; color: var(--primary);"><i class="fas fa-motorcycle"></i></div>
                    <div style="position: absolute; top: 60%; left: 70%; color: var(--primary);"><i class="fas fa-motorcycle"></i></div>
                    <div style="position: absolute; top: 20%; left: 80%; color: var(--primary);"><i class="fas fa-motorcycle"></i></div>
                </div>
            </div>
        </div>
    </div>
    <script src="js/main.js"></script>
</body>
</html>
