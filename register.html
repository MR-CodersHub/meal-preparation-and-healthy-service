<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register | Join FuelUp</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .auth-container {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 40px 20px;
            background: linear-gradient(135deg, #0a0a0a 0%, #1a1a1a 100%);
        }
        .auth-card {
            background: var(--bg-card);
            padding: 50px;
            border-radius: var(--radius-lg);
            border: 1px solid var(--border-color);
            width: 100%;
            max-width: 500px;
            box-shadow: 0 30px 60px rgba(0,0,0,0.5);
        }
    </style>
    <link rel="icon" type="image/png" href="assets/images/favicon.png">
</head>
<body>
    <div class="auth-container">
        <div class="auth-card">
            <div style="text-align: center; margin-bottom: 40px;">
                <a href="index.html" class="logo" style="display: inline-block; font-size: 2rem; margin-bottom: 15px;"><img src="assets/images/logo.png" alt="FuelUp Logo" class="logo-img">FUEL<span>UP</span></a>
                <h2 style="font-size: 1.5rem;">Create Account</h2>
                <p style="color: var(--text-muted); margin-top: 10px;">Start your healthy journey today</p>
            </div>

            <form action="dashboard.html">
                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 20px;">
                    <div>
                        <label style="display: block; margin-bottom: 8px; font-size: 0.9rem; color: var(--text-muted);">First Name</label>
                        <input type="text" placeholder="John" style="width: 100%; background: rgba(255,255,255,0.03); border: 1px solid var(--border-color); padding: 14px; border-radius: 10px; color: #fff;" required>
                    </div>
                    <div>
                        <label style="display: block; margin-bottom: 8px; font-size: 0.9rem; color: var(--text-muted);">Last Name</label>
                        <input type="text" placeholder="Doe" style="width: 100%; background: rgba(255,255,255,0.03); border: 1px solid var(--border-color); padding: 14px; border-radius: 10px; color: #fff;" required>
                    </div>
                </div>
                <div style="margin-bottom: 20px;">
                    <label style="display: block; margin-bottom: 8px; font-size: 0.9rem; color: var(--text-muted);">Email Address</label>
                    <input type="email" placeholder="name@company.com" style="width: 100%; background: rgba(255,255,255,0.03); border: 1px solid var(--border-color); padding: 14px; border-radius: 10px; color: #fff;" required>
                </div>
                <div style="margin-bottom: 20px;">
                    <label style="display: block; margin-bottom: 8px; font-size: 0.9rem; color: var(--text-muted);">Goal</label>
                    <select style="width: 100%; background: rgba(255,255,255,0.03); border: 1px solid var(--border-color); padding: 14px; border-radius: 10px; color: #fff; cursor: pointer;">
                        <option>Muscle Gain</option>
                        <option>Weight Loss</option>
                        <option>Healthy Lifestyle</option>
                        <option>Keto Diet</option>
                    </select>
                </div>
                <div style="margin-bottom: 25px;">
                    <label style="display: block; margin-bottom: 8px; font-size: 0.9rem; color: var(--text-muted);">Password</label>
                    <input type="password" placeholder="••••••••" style="width: 100%; background: rgba(255,255,255,0.03); border: 1px solid var(--border-color); padding: 14px; border-radius: 10px; color: #fff;" required>
                    <p style="font-size: 0.75rem; color: var(--text-muted); margin-top: 8px;">At least 8 characters with 1 number</p>
                </div>
                
                <button type="submit" class="btn btn-primary" style="width: 100%; padding: 14px;">Create Account</button>
            </form>

            <p style="text-align: center; margin-top: 30px; color: var(--text-muted); font-size: 0.9rem;">
                Already have an account? <a href="login.html" style="color: var(--primary); font-weight: 700;">Login</a>
            </p>
        </div>
    </div>
</body>
</html>
