<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Account Settings | FuelUp Kitchen</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="sidebar-overlay"></div>
    <div class="dashboard-wrapper">
        <div class="sidebar">
            <a href="index.html" class="logo">FUEL<span>UP</span></a>
            <nav class="sidebar-nav" style="height: calc(100% - 100px); display: flex; flex-direction: column;">
                <div style="flex: 1;">
                    <a href="dashboard.html" class="nav-item"><i class="fas fa-user-circle"></i> Profile</a>
                    <a href="user-orders.html" class="nav-item"><i class="fas fa-history"></i> Order History</a>
                    <a href="user-favorites.html" class="nav-item"><i class="fas fa-heart"></i> Saved Items</a>
                    <a href="user-messages.html" class="nav-item"><i class="fas fa-comment-dots"></i> Messages</a>
                    <a href="user-tracking.html" class="nav-item"><i class="fas fa-map-marker-alt"></i> Tracking</a>
                    <a href="user-settings.html" class="nav-item active"><i class="fas fa-cog"></i> Settings</a>
                </div>
                <a href="index.html" class="nav-item" style="color: #ff4d4d; margin-top: auto;"><i class="fas fa-sign-out-alt"></i> Logout</a>
            </nav>
        </div>

        <div class="main-content">
            <div class="mobile-dash-header" style="display: flex; align-items: center; gap: 15px; margin-bottom: 20px;">
                    <button class="dash-toggle" aria-label="Toggle Sidebar" style="background: none; border: none; outline: none;">
                        <i class="fas fa-bars"></i>
                    </button>
                    <h1 style="font-size: clamp(1.2rem, 5vw, 2.5rem); margin: 0;">Account <span class="text-gradient">Settings</span></h1>
                </div>
            <p style="color: var(--text-muted); margin-bottom: 40px;">Manage your profile, preferences, and security.</p>

            <div class="dash-card">
                <form style="display: grid; gap: 30px; max-width: 600px;">
                    <div>
                        <label style="display: block; margin-bottom: 10px; font-size: 0.9rem;">Full Name</label>
                        <input type="text" value="Alex Smith" class="glass" style="width: 100%; padding: 12px 20px; border-radius: var(--radius-sm); background: var(--bg-surface); color: #fff; border: 1px solid var(--border-color);">
                    </div>
                    <div>
                        <label style="display: block; margin-bottom: 10px; font-size: 0.9rem;">Email Address</label>
                        <input type="email" value="alex.smith@example.com" class="glass" style="width: 100%; padding: 12px 20px; border-radius: var(--radius-sm); background: var(--bg-surface); color: #fff; border: 1px solid var(--border-color);">
                    </div>
                    <div>
                        <label style="display: block; margin-bottom: 10px; font-size: 0.9rem;">Default Delivery Address</label>
                        <textarea class="glass" style="width: 100%; padding: 12px 20px; border-radius: var(--radius-sm); background: var(--bg-surface); color: #fff; border: 1px solid var(--border-color);">123 Gourmet Lane, Foodie District, CA 90210</textarea>
                    </div>
                    
                    <div style="border-top: 1px solid var(--border-color); padding-top: 30px; margin-top: 10px;">
                        <h4 style="margin-bottom: 20px;">Communication Preferences</h4>
                        <div style="display: flex; flex-direction: column; gap: 15px;">
                            <label style="display: flex; align-items: center; gap: 10px; cursor: pointer;">
                                <input type="checkbox" checked style="accent-color: var(--primary);">
                                <span style="font-size: 0.9rem;">Email me about new menu items</span>
                            </label>
                            <label style="display: flex; align-items: center; gap: 10px; cursor: pointer;">
                                <input type="checkbox" checked style="accent-color: var(--primary);">
                                <span style="font-size: 0.9rem;">SMS alerts for delivery tracking</span>
                            </label>
                        </div>
                    </div>

                    <button class="btn btn-primary" style="justify-self: flex-start;">Save Changes</button>
                </form>
            </div>
        </div>
    </div>
    <script src="js/main.js"></script>
</body>
</html>
